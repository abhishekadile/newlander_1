<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IncuCount AI | Colony Detection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-icon">Target</div>
                <h1>IncuCount</h1>
            </div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <span class="icon">🔍</span> Detect
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">⚙️</span> Settings
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">📊</span> History
                </a>
            </nav>

            <div class="status-panel">
                <div class="status-item">
                    <span class="label">Backend</span>
                    <span class="value online">Online</span>
                </div>
                <div class="status-item">
                    <span class="label">Version</span>
                    <span class="value">2.0.0</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h2>Colony Detection</h2>
                <div class="actions">
                    <button id="exportBtn" class="btn secondary" disabled>Export CSV</button>
                    <button id="clearBtn" class="btn text">Clear</button>
                </div>
            </header>

            <div class="workspace">
                <!-- Upload Area -->
                <div class="upload-zone" id="dropZone">
                    <input type="file" id="fileInput" accept="image/*" hidden>
                    <div class="upload-content">
                        <div class="upload-icon">☁️</div>
                        <h3>Upload Image</h3>
                        <p>Drag & drop or click to browse</p>
                        <span class="file-types">Supports JPG, PNG, BMP, TIFF</span>
                    </div>
                </div>

                <!-- Canvas / Result Area -->
                <div class="canvas-container hidden" id="resultContainer">
                    <div class="canvas-wrapper">
                        <canvas id="detectionCanvas"></canvas>
                        <div class="loading-overlay hidden" id="loadingOverlay">
                            <div class="spinner"></div>
                            <p>Processing...</p>
                        </div>
                    </div>
                    
                    <!-- Result Stats Overlay -->
                    <div class="stats-panel" id="statsPanel">
                        <div class="stat-card">
                            <span class="stat-value" id="countValue">0</span>
                            <span class="stat-label">Colonies</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-value" id="radiusValue">0</span>
                            <span class="stat-label">Avg Radius</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Parameters Panel (Right Side) -->
        <aside class="params-panel">
            <h3>Parameters</h3>
            
            <div class="param-group">
                <label>Threshold Type</label>
                <div class="toggle-group">
                    <input type="radio" name="threshold_type" value="regular" id="t_reg" checked>
                    <label for="t_reg">Regular</label>
                    <input type="radio" name="threshold_type" value="inverted" id="t_inv">
                    <label for="t_inv">Inverted</label>
                </div>
            </div>

            <div class="param-group">
                <label>Threshold Value: <span id="threshValDisplay">15</span></label>
                <input type="range" id="threshold_value" min="0" max="255" value="15">
            </div>

            <div class="param-group">
                <label>Radius Range (px)</label>
                <div class="range-inputs">
                    <div class="input-wrapper">
                        <label>Min</label>
                        <input type="number" id="min_radius" value="3">
                    </div>
                    <div class="input-wrapper">
                        <label>Max</label>
                        <input type="number" id="max_radius" value="50">
                    </div>
                </div>
            </div>

            <div class="param-group">
                <label>Color Grouping</label>
                <label class="switch">
                    <input type="checkbox" id="enable_color_grouping">
                    <span class="slider round"></span>
                </label>
            </div>

            <button id="detectBtn" class="btn primary blocked">Run Detection</button>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
