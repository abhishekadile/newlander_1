<style>

    }

    .sample-thumb {

    #resultContainer {

    #viewerStatus {

    /* Responsive */

</style>

<script>
    (function () {
        const galleryImages = [
            { id: "WIN_20250905_11_49_20_Pro", src: "https://cdn.shopify.com/s/files/1/0916/7968/6953/files/WIN_20250905_11_49_20_Pro.jpg?v=1768658241" },
            { id: "WIN_20250905_11_48_18_Pro", src: "https://cdn.shopify.com/s/files/1/0916/7968/6953/files/WIN_20250905_11_48_18_Pro.jpg?v=1768658261" },
            { id: "WIN_20250905_11_42_42_Pro", src: "https://cdn.shopify.com/s/files/1/0916/7968/6953/files/WIN_20250905_11_42_42_Pro.jpg?v=1768658294" },
            { id: "WIN_20250905_11_44_26_Pro", src: "https://cdn.shopify.com/s/files/1/0916/7968/6953/files/WIN_20250905_11_44_26_Pro.jpg?v=1768658311" },
            { id: "complex1", src: "https://cdn.shopify.com/s/files/1/0916/7968/6953/files/complex_1.jpg?v=1768658362" },
            { id: "standard1", src: "https://cdn.shopify.com/s/files/1/0916/7968/6953/files/standard_1.jpg?v=1768658362" },
            { id: "85.bmp", src: "https://cdn.shopify.com/s/files/1/0916/7968/6953/files/85.bmp?v=1768658417" },
            { id: "82.bmp", src: "https://cdn.shopify.com/s/files/1/0916/7968/6953/files/82.bmp?v=1768658433" }
        ];

        let currentImageId = galleryImages[0].id;
        let currentImageSrc = galleryImages[0].src;
        let currentScale = 1, panX = 0, panY = 0;
        let minScale = 0.1;
        let isDragging = false, startX, startY;
        let showOverlay = true;

        const initInterval = setInterval(() => {
            if (document.getElementById('colonyAppRoot')) {
                clearInterval(initInterval);
                initApp();
            }
        }, 100);

        function initApp() {
            const gallery = document.getElementById('galleryRow');
            gallery.innerHTML = '';

            galleryImages.forEach((item, idx) => {
                const img = document.createElement('img');
                img.src = item.src;
                img.className = 'sample-thumb' + (idx === 0 ? ' active' : '');
                img.onclick = () => selectImage(item, img);
                gallery.appendChild(img);
            });

            document.getElementById('btnZoomIn').onclick = () => { currentScale *= 1.2; applyTransform(); };
            document.getElementById('btnZoomOut').onclick = () => { currentScale = Math.max(minScale, currentScale / 1.2); applyTransform(); };
            document.getElementById('btnReset').onclick = resetView;
            document.getElementById('processBtn').onclick = processSelectedImage;
            document.getElementById('overlayToggle').onchange = function () {
                showOverlay = this.checked;
                document.querySelectorAll('.colony-marker').forEach(m => m.style.display = showOverlay ? 'block' : 'none');
            };

            const sliders = ['annThresholdValue', 'annMinRadius', 'annMaxRadius', 'annCoarseness', 'annNeighbours'];
            sliders.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    const update = () => {
                        document.getElementById(id + 'Label').textContent = el.value;
                        const pct = ((el.value - el.min) / (el.max - el.min)) * 100;
                        document.getElementById(id + 'Fill').style.width = pct + '%';
                    };
                    el.oninput = update;
                    update();
                }
            });

            setupViewerControls();
            loadImageIntoViewer(currentImageSrc);
        }

        function selectImage(item, thumb) {
            currentImageId = item.id;
            currentImageSrc = item.src;
            document.querySelectorAll('.sample-thumb').forEach(el => el.classList.remove('active'));
            thumb.classList.add('active');
            document.querySelectorAll('.colony-marker').forEach(el => el.remove());
            document.getElementById('colonyCount').textContent = '0';
            loadImageIntoViewer(item.src);
        }

        function loadImageIntoViewer(src) {
            const img = document.getElementById('displayImage');
            const status = document.getElementById('viewerStatus');
            status.style.display = 'block';
            status.textContent = 'Loading...';
            img.style.opacity = '0.3';
            img.onload = () => {
                status.style.display = 'none';
                img.style.opacity = '1';
                resetView();
            };
            img.src = src;
        }

        async function processSelectedImage() {
            const btn = document.getElementById('processBtn');
            const original = btn.innerHTML;
            btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="8"/></svg> Processing...';
            btn.disabled = true;

            try {
                const payload = {
                    image_id: currentImageId,
                    threshold_type: document.getElementById('annThresholdType').value,
                    threshold_value: +document.getElementById('annThresholdValue').value,
                    min_radius: +document.getElementById('annMinRadius').value,
                    max_radius: +document.getElementById('annMaxRadius').value,
                    coarseness: +document.getElementById('annCoarseness').value,
                    neighbours: +document.getElementById('annNeighbours').value,
                    enable_color_grouping: document.getElementById('annEnableColorGrouping').checked
                };

                const res = await fetch('https://incucount-website-backend.onrender.com/detect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || data.message || `HTTP ${res.status}`);

                if (data.success && data.colonies) {
                    drawMarkers(data.colonies);
                    document.getElementById('colonyCount').textContent = data.colonies.length;
                } else {
                    document.getElementById('colonyCount').textContent = '0';
                }
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.innerHTML = original;
                btn.disabled = false;
            }
        }

        function drawMarkers(colonies) {
            const container = document.getElementById('resultContainer');
            document.querySelectorAll('.colony-marker').forEach(el => el.remove());
            colonies.forEach(c => {
                const m = document.createElement('div');
                m.className = 'colony-marker';
                m.style.cssText = `position:absolute;left:${c.x}px;top:${c.y}px;width:${c.radius * 2}px;height:${c.radius * 2}px;border:2px solid #22c55e;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 6px rgba(34,197,94,0.5);display:${showOverlay ? 'block' : 'none'}`;
                container.appendChild(m);
            });
        }

        function setupViewerControls() {
            const vp = document.getElementById('zoomViewport');

            vp.onmousedown = e => {
                e.preventDefault();
                isDragging = true;
                startX = e.clientX - panX;
                startY = e.clientY - panY;
                vp.style.cursor = 'grabbing';
            };

            document.onmousemove = e => {
                if (!isDragging) return;
                panX = e.clientX - startX;
                panY = e.clientY - startY;
                applyTransform();
            };

            document.onmouseup = () => {
                isDragging = false;
                document.getElementById('zoomViewport').style.cursor = 'crosshair';
            };

            vp.onwheel = e => {
                e.preventDefault();
                const rect = vp.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const dir = e.deltaY < 0 ? 1.1 : 0.9;
                const next = Math.max(minScale, Math.min(10, currentScale * dir));
                panX = mx - (mx - panX) * (next / currentScale);
                panY = my - (my - panY) * (next / currentScale);
                currentScale = next;
                applyTransform();
            };

            let lastDist = 0;
            vp.ontouchstart = e => {
                if (e.touches.length === 1) {
                    isDragging = true;
                    startX = e.touches[0].clientX - panX;
                    startY = e.touches[0].clientY - panY;
                } else if (e.touches.length === 2) {
                    lastDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
                }
            };
            vp.ontouchmove = e => {
                e.preventDefault();
                if (e.touches.length === 1 && isDragging) {
                    panX = e.touches[0].clientX - startX;
                    panY = e.touches[0].clientY - startY;
                    applyTransform();
                } else if (e.touches.length === 2) {
                    const d = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
                    currentScale = Math.max(minScale, Math.min(10, currentScale * (1 + (d - lastDist) * 0.005)));
                    lastDist = d;
                    applyTransform();
                }
            };
            vp.ontouchend = () => isDragging = false;
        }

        function applyTransform() {
            const vp = document.getElementById('zoomViewport');
            const img = document.getElementById('displayImage');
            if (!img.naturalWidth) return;

            const iw = img.naturalWidth * currentScale;
            const ih = img.naturalHeight * currentScale;
            const vw = vp.clientWidth;
            const vh = vp.clientHeight;

            if (iw <= vw) panX = (vw - iw) / 2;
            else panX = Math.min(0, Math.max(vw - iw, panX));

            if (ih <= vh) panY = (vh - ih) / 2;
            else panY = Math.min(0, Math.max(vh - ih, panY));

            document.getElementById('resultContainer').style.transform = `translate(${panX}px,${panY}px) scale(${currentScale})`;
        }

        function resetView() {
            const vp = document.getElementById('zoomViewport');
            const img = document.getElementById('displayImage');
            const container = document.getElementById('resultContainer');
            if (!img.naturalWidth) return;

            container.style.width = img.naturalWidth + 'px';
            container.style.height = img.naturalHeight + 'px';

            const sx = vp.clientWidth / img.naturalWidth;
            const sy = vp.clientHeight / img.naturalHeight;
            minScale = Math.min(sx, sy, 1);
            currentScale = minScale;
            applyTransform();
        }

        const style = document.createElement('style');
        style.textContent = '@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}';
        document.head.appendChild(style);
    })();
</script>
